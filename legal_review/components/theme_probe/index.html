<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8" />
    <script>
        let lastTheme = null;

        function sendMessageToStreamlit(type, data) {
            window.parent.postMessage({ isStreamlitMessage: true, type: type, ...data }, "*");
        }

        function readThemeLabel() {
            let raw = null;
            try {
                raw = window.parent.localStorage.getItem("stActiveTheme");
            } catch (e) {
                try {
                    raw = localStorage.getItem("stActiveTheme");
                } catch (err) {
                    raw = null;
                }
            }

            if (raw) {
                try {
                    raw = JSON.parse(raw);
                } catch (e) {
                    raw = String(raw).replace(/^"+|"+$/g, "");
                }
            }

            if (raw === "Dark") return "dark";
            if (raw === "Light") return "light";
            return window.matchMedia && window.matchMedia("(prefers-color-scheme: dark)").matches ? "dark" : "light";
        }

        function emitTheme(force = false) {
            const nextTheme = readThemeLabel();
            if (!force && nextTheme === lastTheme) {
                return;
            }
            lastTheme = nextTheme;
            sendMessageToStreamlit("streamlit:setFrameHeight", { height: 0 });
            sendMessageToStreamlit("streamlit:setComponentValue", { value: nextTheme });
        }

        window.addEventListener("message", function (event) {
            if (event.data.type === "streamlit:render") {
                emitTheme();
            }
        });

        window.addEventListener("storage", emitTheme);

        if (window.matchMedia) {
            const mq = window.matchMedia("(prefers-color-scheme: dark)");
            if (mq.addEventListener) {
                mq.addEventListener("change", emitTheme);
            } else if (mq.addListener) {
                mq.addListener(emitTheme);
            }
        }

        window.addEventListener("load", function () {
            sendMessageToStreamlit("streamlit:componentReady", { apiVersion: 1 });
            emitTheme(true);
        });
    </script>
</head>
<body></body>
</html>
